<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyGoing Hub</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&family=Orbitron:wght@600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Effects -->
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="grid-overlay"></div>

    <div class="container">
        <!-- Header -->
        <header class="hub-header">
            <div class="logo">
                <h1>EASYGOING</h1>
            </div>
            <div class="title-section">
                <h2>APPLICATION HUB</h2>
                <div class="app-badge"><span id="total-apps">0</span> APPS</div>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <main id="app-container">
            <!-- Content will be injected by main.js -->
        </main>

        <!-- Footer -->
        <footer>
            <p>&copy; 2026 EasyGoing Hub. All rights reserved.</p>
        </footer>
    </div>
    
    <script src="main.js"></script>
</body>
</html>
